<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>macskusz_exhibit_denver</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #f4f1e8;
      font-family: Helvetica, Arial, sans-serif;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 72px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Waiting for Art</h1>
  </main>
  <script>
    (() => {
      let last = null;
      setInterval(async () => {
        try {
          const t = await (await fetch('manifest.json?_=' + Date.now(), {cache: 'no-store'})).text();
          if (last !== null && t !== last) location.reload();
          last = t;
        } catch (e) {
          /* offline: ignore, keep showing current */
        }
      }, 15000);
    })();
  </script>
</body>
</html>
